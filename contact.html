<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>İletişim</title>

<style>

*{box-sizing:border-box;}

body{
margin:0;
font-family:Arial;
background:#f4f7fb;
color:#1e293b;
}

.page-wrapper{
width:92%;
max-width:1100px;
margin:0 auto;
}

header{
margin-top:30px;
background:linear-gradient(135deg,#0f172a,#1e3a8a);
color:white;
border-radius:22px;
padding:42px 24px;
text-align:center;
}

nav{
margin:18px 0 24px 0;
background:white;
border:1px solid #dbe3ef;
border-radius:16px;
padding:14px 20px;
}

nav ul{
margin:0;
padding:0;
list-style:none;
display:flex;
justify-content:center;
gap:14px;
}

nav a{
text-decoration:none;
color:#1e3a8a;
font-weight:bold;
padding:10px 16px;
border-radius:10px;
}

nav a:hover{background:#eff6ff;}

.contact-container{
background:white;
border:1px solid #dbe3ef;
border-radius:22px;
padding:34px 28px;
box-shadow:0 12px 30px rgba(15,23,42,0.06);
}

.contact-container h2{
text-align:center;
}

input,select,textarea{
width:100%;
padding:14px;
margin-bottom:18px;
border:1px solid #cbd5e1;
border-radius:12px;
background:#f8fafc;
}

textarea{min-height:130px;}

.option-box{
background:#f8fafc;
border:1px solid #e2e8f0;
border-radius:14px;
padding:14px;
margin-bottom:18px;
}

.button-group{
display:flex;
gap:14px;
}

button{
flex:1;
border:none;
padding:14px;
border-radius:12px;
font-weight:bold;
}

.submit-btn{
background:#2563eb;
color:white;
}

.reset-btn{
background:#dc2626;
color:white;
}

footer{
text-align:center;
padding:30px;
color:#64748b;
}

</style>
</head>

<body>

<div class="page-wrapper">

<header>
<h1>Zeynep UÇAR</h1>
<p>Bilgisayar Mühendisliği Öğrencisi | Web & Yazılım Geliştirici Adayı</p>
</header>

<nav>
<ul>
<li><a href="index.html">Ana Sayfa</a></li>
<li><a href="about.html">Hakkımda</a></li>
<li><a href="interests.html">İlgi Alanlarım</a></li>
<li><a href="contact.html">İletişim</a></li>
</ul>
</nav>

<div class="contact-container">

<h2>Detaylı İletişim Formu</h2>

<form>

<label>Ad Soyad</label>
<input type="text" placeholder="Adınız">

<label>E-posta</label>
<input type="email" placeholder="ornek@mail.com">

<label>Şifre</label>
<input type="password">

<label>İletişim Tercihi</label>

<div class="option-box">
<label><input type="radio" name="contact"> E-posta</label>
<label><input type="radio" name="contact"> Telefon</label>
</div>

<label>Yetenekler</label>

<div class="option-box">
<label><input type="checkbox"> HTML</label>
<label><input type="checkbox"> CSS</label>
<label><input type="checkbox"> Algoritma</label>
</div>

<label>Konu</label>
<select>
<option>İş Teklifi</option>
<option>Soru</option>
<option>Geri Bildirim</option>
</select>

<label>Dosya</label>
<input type="file">

<label>Mesaj</label>
<textarea></textarea>

<div class="button-group">
<button class="submit-btn">Gönder</button>
<button class="reset-btn">Temizle</button>
</div>

</form>

</div>

<footer>
<p>© 2026 Zeynep UÇAR | Web Programlama Dersi</p>
</footer>

</div>

</body>
</html>
