<style>
    * {
        box-sizing: border-box;
    }

    html {
        scroll-behavior: smooth;
    }

    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #f4f7fb;
        color: #1e293b;
        line-height: 1.6;
    }

    .page-wrapper {
        width: 92%;
        max-width: 1100px;
        margin: 0 auto;
    }

    header {
        margin-top: 30px;
        background: linear-gradient(135deg, #0f172a, #1e3a8a);
        color: white;
        border-radius: 22px;
        padding: 42px 24px;
        text-align: center;
        box-shadow: 0 14px 32px rgba(15, 23, 42, 0.18);
    }

    header h1 {
        margin: 0 0 10px 0;
        font-size: 36px;
    }

    header p {
        margin: 0;
        font-size: 16px;
        color: #dbeafe;
    }

    nav {
        margin: 18px 0 24px 0;
        background: #ffffff;
        border: 1px solid #dbe3ef;
        border-radius: 16px;
        padding: 14px 20px;
        box-shadow: 0 8px 24px rgba(15, 23, 42, 0.05);
    }

    nav ul {
        margin: 0;
        padding: 0;
        list-style: none;
        display: flex;
        justify-content: center;
        gap: 14px;
        flex-wrap: wrap;
    }

    nav a {
        text-decoration: none;
        color: #1e3a8a;
        font-weight: bold;
        padding: 10px 16px;
        border-radius: 10px;
        transition: 0.25s;
    }

    nav a:hover {
        background: #eff6ff;
    }

    main {
        background: #ffffff;
        border: 1px solid #dbe3ef;
        border-radius: 20px;
        padding: 32px 28px;
        box-shadow: 0 10px 28px rgba(15, 23, 42, 0.05);
    }

    main h2 {
        color: #0f172a;
        margin-top: 0;
        margin-bottom: 12px;
        font-size: 24px;
    }

    main p,
    main li {
        color: #475569;
        font-size: 15px;
    }

    main a {
        color: #2563eb;
        text-decoration: none;
        font-weight: bold;
    }

    .contact-container {
        width: 100%;
        max-width: 760px;
        margin: 32px auto 0 auto;
        background: #ffffff;
        border: 1px solid #dbe3ef;
        border-radius: 22px;
        padding: 34px 28px;
        box-shadow: 0 12px 30px rgba(15, 23, 42, 0.06);
    }

    .contact-container h2 {
        text-align: center;
        margin-top: 0;
        margin-bottom: 28px;
        color: #0f172a;
        font-size: 30px;
    }

    .contact-container label {
        display: block;
        margin-bottom: 8px;
        font-weight: bold;
        color: #334155;
        font-size: 14px;
    }

    .contact-container input[type="text"],
    .contact-container input[type="email"],
    .contact-container input[type="password"],
    .contact-container input[type="file"],
    .contact-container select,
    .contact-container textarea {
        width: 100%;
        padding: 14px 15px;
        margin-bottom: 18px;
        border: 1px solid #cbd5e1;
        border-radius: 12px;
        background: #f8fafc;
        font-size: 14px;
        color: #0f172a;
        transition: 0.25s ease;
    }

    .contact-container input:focus,
    .contact-container select:focus,
    .contact-container textarea:focus {
        outline: none;
        border-color: #3b82f6;
        background: #ffffff;
        box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.12);
    }

    .contact-container textarea {
        min-height: 130px;
        resize: vertical;
    }

    .option-box {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 14px;
        padding: 14px 16px;
        margin-bottom: 18px;
    }

    .option-box label {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 10px;
        font-weight: normal;
        color: #475569;
    }

    .button-group {
        display: flex;
        gap: 14px;
        margin-top: 8px;
        flex-wrap: wrap;
    }

    .button-group button {
        flex: 1;
        min-width: 180px;
        border: none;
        border-radius: 12px;
        padding: 14px 18px;
        font-size: 15px;
        font-weight: bold;
        cursor: pointer;
        transition: 0.2s ease;
    }

    .button-group button:hover {
        transform: translateY(-1px);
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.08);
    }

    .submit-btn {
        background: #2563eb;
        color: white;
    }

    .reset-btn {
        background: #dc2626;
        color: white;
    }

    footer {
        text-align: center;
        color: #64748b;
        padding: 28px 12px 40px 12px;
        font-size: 14px;
    }

    @media (max-width: 768px) {
        header h1 {
            font-size: 28px;
        }

        .contact-container h2 {
            font-size: 24px;
        }

        main,
        .contact-container,
        header {
            padding: 24px 18px;
        }

        .button-group {
            flex-direction: column;
        }
    }
</style>
